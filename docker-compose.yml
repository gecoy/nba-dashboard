version: '3.8'

services:
  # 1. ตู้ฐานข้อมูล (PostgreSQL)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nba_db
    ports:
      - "5433:5432"  # 👈 แก้เลขข้างหน้าเป็น 5433 (ให้ภายนอกเข้าทางนี้) ส่วนข้างหลัง 5432 ปล่อยไว้เหมือนเดิม

  # 2. ตู้หลังบ้าน (Go)
  backend:
    build: ./backend # ไปอ่าน Dockerfile ในโฟลเดอร์ backend
    ports:
      - "8080:8080"
    depends_on:
      - db # ต้องรอให้ตู้ db เปิดเสร็จก่อน ค่อยเปิดตู้นี้

  # 3. ตู้หน้าบ้าน (React + Nginx)
  frontend:
    build: ./frontend # ไปอ่าน Dockerfile ในโฟลเดอร์ frontend
    ports:
      - "5173:80" # ผูกพอร์ต 5173 ของเครื่องเรา เข้ากับพอร์ต 80 ของตู้นี้
    depends_on:
      - backend